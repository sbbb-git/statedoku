<main>
  <section class="hub-hero">
    <span class="hub-chip">🏛️ TYPE CAPITALS</span>

  <div class="game-wrap">
    <div class="game-panel">
      <span class="lbl">Round</span><span class="val" id="g-round">1/15</span>
      <span class="lbl" style="margin-left:14px">Score</span><span class="val" id="g-score">0</span>

      <div class="qlbl">Capital of:</div>
      <div class="qval" id="g-prompt">—</div>
    </div>

    <div class="feedback" id="g-feedback">&nbsp;</div>

    <input type="text" class="text-input" id="g-input" placeholder="Type a state name…" autocomplete="off" />

    <div class="controls">
      <button class="gbtn gold" id="g-start">Start</button>
      <button class="gbtn" id="g-submit" style="display:none">Submit</button>

    </div>

  </div>

  <script>
  (function(){
    
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function stars(s,t){const p=s/t;return p>=0.9?3:p>=0.6?2:p>=0.3?1:0;}
function persistResult(slug,score,total,st){try{const k='sds_play_'+slug;const today=new Date().toISOString().slice(0,10);const prev=JSON.parse(localStorage.getItem(k)||'{}');const y=new Date(Date.now()-86400000).toISOString().slice(0,10);const streak=(prev.lastPlayed===today)?(prev.streak||0):(prev.lastPlayed===y)?((prev.streak||0)+1):1;localStorage.setItem(k,JSON.stringify({lastPlayed:today,streak:streak,best:Math.max(prev.best||0,score)}));if(window.gtag)window.gtag('event','play_complete',{game:slug,score:score,total:total,stars:st});}catch(e){}}
async function shareResult(txt){try{if(navigator.share){await navigator.share({text:txt});return;}}catch(e){}try{await navigator.clipboard.writeText(txt);alert("Copied");}catch(e){alert(txt);}}
function renderResult(rootEl,score,total,T_,slug,sharePrefix){const st=stars(score,total);const filled='★'.repeat(st);const off='☆'.repeat(3-st);rootEl.style.display='block';rootEl.innerHTML='<h2>'+(score>=total*.3?T_.wellDone:T_.gameOver)+'</h2>'+'<div style="font-size:1.05rem;margin-bottom:6px"><strong>'+score+'/'+total+'</strong> ('+Math.round(score/total*100)+'%)</div>'+'<div class="stars"><span>'+filled+'</span><span class="off">'+off+'</span></div>'+'<div style="margin-top:10px"><button class="gbtn gold" onclick="window.location.reload()">'+T_.tryAgain+'</button> <button class="gbtn" id="_share">'+T_.share+'</button></div>';document.getElementById('_share').addEventListener('click',()=>shareResult(sharePrefix+' '+score+'/'+total+' '+('⭐'.repeat(st)+'⬜'.repeat(3-st))+' statedoku.com'+window.location.pathname));persistResult(slug,score,total,st);}

    const ITEMS = [{"prompt":"Alabama","answer":"Montgomery","alt":[]},{"prompt":"Alaska","answer":"Juneau","alt":[]},{"prompt":"Arizona","answer":"Phoenix","alt":[]},{"prompt":"Arkansas","answer":"Little Rock","alt":[]},{"prompt":"California","answer":"Sacramento","alt":[]},{"prompt":"Colorado","answer":"Denver","alt":[]},{"prompt":"Connecticut","answer":"Hartford","alt":[]},{"prompt":"Delaware","answer":"Dover","alt":[]},{"prompt":"Florida","answer":"Tallahassee","alt":[]},{"prompt":"Georgia","answer":"Atlanta","alt":[]},{"prompt":"Hawaii","answer":"Honolulu","alt":[]},{"prompt":"Idaho","answer":"Boise","alt":[]},{"prompt":"Illinois","answer":"Springfield","alt":[]},{"prompt":"Indiana","answer":"Indianapolis","alt":[]},{"prompt":"Iowa","answer":"Des Moines","alt":[]},{"prompt":"Kansas","answer":"Topeka","alt":[]},{"prompt":"Kentucky","answer":"Frankfort","alt":[]},{"prompt":"Louisiana","answer":"Baton Rouge","alt":[]},{"prompt":"Maine","answer":"Augusta","alt":[]},{"prompt":"Maryland","answer":"Annapolis","alt":[]},{"prompt":"Massachusetts","answer":"Boston","alt":[]},{"prompt":"Michigan","answer":"Lansing","alt":[]},{"prompt":"Minnesota","answer":"Saint Paul","alt":[]},{"prompt":"Mississippi","answer":"Jackson","alt":[]},{"prompt":"Missouri","answer":"Jefferson City","alt":[]},{"prompt":"Montana","answer":"Helena","alt":[]},{"prompt":"Nebraska","answer":"Lincoln","alt":[]},{"prompt":"Nevada","answer":"Carson City","alt":[]},{"prompt":"New Hampshire","answer":"Concord","alt":[]},{"prompt":"New Jersey","answer":"Trenton","alt":[]},{"prompt":"New Mexico","answer":"Santa Fe","alt":[]},{"prompt":"New York","answer":"Albany","alt":[]},{"prompt":"North Carolina","answer":"Raleigh","alt":[]},{"prompt":"North Dakota","answer":"Bismarck","alt":[]},{"prompt":"Ohio","answer":"Columbus","alt":[]},{"prompt":"Oklahoma","answer":"Oklahoma City","alt":[]},{"prompt":"Oregon","answer":"Salem","alt":[]},{"prompt":"Pennsylvania","answer":"Harrisburg","alt":[]},{"prompt":"Rhode Island","answer":"Providence","alt":[]},{"prompt":"South Carolina","answer":"Columbia","alt":[]},{"prompt":"South Dakota","answer":"Pierre","alt":[]},{"prompt":"Tennessee","answer":"Nashville","alt":[]},{"prompt":"Texas","answer":"Austin","alt":[]},{"prompt":"Utah","answer":"Salt Lake City","alt":[]},{"prompt":"Vermont","answer":"Montpelier","alt":[]},{"prompt":"Virginia","answer":"Richmond","alt":[]},{"prompt":"Washington","answer":"Olympia","alt":[]},{"prompt":"West Virginia","answer":"Charleston","alt":[]},{"prompt":"Wisconsin","answer":"Madison","alt":[]},{"prompt":"Wyoming","answer":"Cheyenne","alt":[]}];
    const SHARE_PREFIX = "⌨️";
    const T_ = {"round":"Round","score":"Score","lives":"Lives","start":"Start","tryAgain":"Play again","share":"Share result","wellDone":"Well done!","gameOver":"Game over","easy":"Easy","normal":"Normal","hard":"Hard","submit":"Submit","skip":"Skip","categories":"Categories","solved":"Solved","mistakes":"Mistakes","pick4":"Pick 4 states that share a category","placeholder":"Type a state name…"};
    const TOTAL = 15;
    let queue=[],round=0,score=0,lives=3;
    const $ = id => document.getElementById(id);

    function normalize(s){return (s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();}
    function pickQueue(){return shuffle(ITEMS).slice(0,TOTAL);}

    function nextRound(){
      if(round>=TOTAL||queue.length===0)return finish();
      round++;
      const it = queue.shift();
      $('g-round').textContent = round+'/'+TOTAL;
      $('g-prompt').textContent = it.prompt;
      $('g-prompt').dataset.answer = it.answer;
      $('g-prompt').dataset.altAnswers = JSON.stringify(it.alt||[]);
      $('g-input').value = ''; $('g-input').focus();
      $('g-feedback').innerHTML='&nbsp;';
    }
    function submit(){
      const v = $('g-input').value.trim();
      if(!v)return;
      const correct = $('g-prompt').dataset.answer;
      const alts = JSON.parse($('g-prompt').dataset.altAnswers||'[]');
      const ok = normalize(v) === normalize(correct) || alts.some(a => normalize(v) === normalize(a));
      if(ok){
        score++; $('g-feedback').textContent='✅ '+correct; $('g-feedback').className='feedback ok';
      } else {
        lives--;
        $('g-feedback').textContent='❌ → '+correct;
        $('g-feedback').className='feedback no';
        $('g-lives').textContent='❤️'.repeat(lives)+'\u{1F90D}'.repeat(3-lives);
        if(lives<=0){setTimeout(finish,800);return;}
      }
      $('g-score').textContent=score;
      setTimeout(nextRound,700);
    }
    function skip(){lives--;$('g-feedback').textContent='⏭ → '+$('g-prompt').dataset.answer;$('g-feedback').className='feedback no';$('g-lives').textContent='❤️'.repeat(lives)+'\u{1F90D}'.repeat(3-lives);if(lives<=0){setTimeout(finish,800);return;}setTimeout(nextRound,700);}
    function finish(){renderResult($('g-result'),score,TOTAL,T_,"state-capitals-typing",SHARE_PREFIX);}
    $('g-start').addEventListener('click',()=>{
      queue=pickQueue(); round=0; score=0; lives=3;
      $('g-lives').textContent='❤️❤️❤️';
      $('g-score').textContent='0'; $('g-result').style.display='none';
      $('g-start').style.display='none'; $('g-submit').style.display='inline-block'; $('g-skip').style.display='inline-block';
      nextRound();
    });
    $('g-submit').addEventListener('click',submit);
    $('g-skip').addEventListener('click',skip);
    $('g-input').addEventListener('keypress',e=>{if(e.key==='Enter')submit();});
  })();
  </script>
