  <script>
  (function(){
    
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function stars(s,t){const p=s/t;return p>=0.9?3:p>=0.6?2:p>=0.3?1:0;}
function persistResult(slug,score,total,st){try{const k='sds_play_'+slug;const today=new Date().toISOString().slice(0,10);const prev=JSON.parse(localStorage.getItem(k)||'{}');const y=new Date(Date.now()-86400000).toISOString().slice(0,10);const streak=(prev.lastPlayed===today)?(prev.streak||0):(prev.lastPlayed===y)?((prev.streak||0)+1):1;localStorage.setItem(k,JSON.stringify({lastPlayed:today,streak:streak,best:Math.max(prev.best||0,score)}));if(window.gtag)window.gtag('event','play_complete',{game:slug,score:score,total:total,stars:st});}catch(e){}}
async function shareResult(txt){try{if(navigator.share){await navigator.share({text:txt});return;}}catch(e){}try{await navigator.clipboard.writeText(txt);alert("Copied");}catch(e){alert(txt);}}
function renderResult(rootEl,score,total,T_,slug,sharePrefix){const st=stars(score,total);const filled='★'.repeat(st);const off='☆'.repeat(3-st);rootEl.style.display='block';rootEl.innerHTML='<h2>'+(score>=total*.3?T_.wellDone:T_.gameOver)+'</h2>'+'<div style="font-size:1.05rem;margin-bottom:6px"><strong>'+score+'/'+total+'</strong> ('+Math.round(score/total*100)+'%)</div>'+'<div class="stars"><span>'+filled+'</span><span class="off">'+off+'</span></div>'+'<div style="margin-top:10px"><button class="gbtn gold" onclick="window.location.reload()">'+T_.tryAgain+'</button> <button class="gbtn" id="_share">'+T_.share+'</button></div>';document.getElementById('_share').addEventListener('click',()=>shareResult(sharePrefix+' '+score+'/'+total+' '+('⭐'.repeat(st)+'⬜'.repeat(3-st))+' statedoku.com'+window.location.pathname));persistResult(slug,score,total,st);}

    const ITEMS = [{"prompt":"Huntsville is the biggest city of which state?","answer":"AL"},{"prompt":"Anchorage is the biggest city of which state?","answer":"AK"},{"prompt":"Phoenix is the biggest city of which state?","answer":"AZ"},{"prompt":"Little Rock is the biggest city of which state?","answer":"AR"},{"prompt":"Los Angeles is the biggest city of which state?","answer":"CA"},{"prompt":"Denver is the biggest city of which state?","answer":"CO"},{"prompt":"Bridgeport is the biggest city of which state?","answer":"CT"},{"prompt":"Wilmington is the biggest city of which state?","answer":"DE"},{"prompt":"Jacksonville is the biggest city of which state?","answer":"FL"},{"prompt":"Atlanta is the biggest city of which state?","answer":"GA"},{"prompt":"Honolulu is the biggest city of which state?","answer":"HI"},{"prompt":"Boise is the biggest city of which state?","answer":"ID"},{"prompt":"Chicago is the biggest city of which state?","answer":"IL"},{"prompt":"Indianapolis is the biggest city of which state?","answer":"IN"},{"prompt":"Des Moines is the biggest city of which state?","answer":"IA"},{"prompt":"Wichita is the biggest city of which state?","answer":"KS"},{"prompt":"Louisville is the biggest city of which state?","answer":"KY"},{"prompt":"New Orleans is the biggest city of which state?","answer":"LA"},{"prompt":"Portland is the biggest city of which state?","answer":"ME"},{"prompt":"Baltimore is the biggest city of which state?","answer":"MD"},{"prompt":"Boston is the biggest city of which state?","answer":"MA"},{"prompt":"Detroit is the biggest city of which state?","answer":"MI"},{"prompt":"Minneapolis is the biggest city of which state?","answer":"MN"},{"prompt":"Jackson is the biggest city of which state?","answer":"MS"},{"prompt":"Kansas City is the biggest city of which state?","answer":"MO"},{"prompt":"Billings is the biggest city of which state?","answer":"MT"},{"prompt":"Omaha is the biggest city of which state?","answer":"NE"},{"prompt":"Las Vegas is the biggest city of which state?","answer":"NV"},{"prompt":"Manchester is the biggest city of which state?","answer":"NH"},{"prompt":"Newark is the biggest city of which state?","answer":"NJ"},{"prompt":"Albuquerque is the biggest city of which state?","answer":"NM"},{"prompt":"New York City is the biggest city of which state?","answer":"NY"},{"prompt":"Charlotte is the biggest city of which state?","answer":"NC"},{"prompt":"Fargo is the biggest city of which state?","answer":"ND"},{"prompt":"Columbus is the biggest city of which state?","answer":"OH"},{"prompt":"Oklahoma City is the biggest city of which state?","answer":"OK"},{"prompt":"Portland is the biggest city of which state?","answer":"OR"},{"prompt":"Philadelphia is the biggest city of which state?","answer":"PA"},{"prompt":"Providence is the biggest city of which state?","answer":"RI"},{"prompt":"Charleston is the biggest city of which state?","answer":"SC"},{"prompt":"Sioux Falls is the biggest city of which state?","answer":"SD"},{"prompt":"Nashville is the biggest city of which state?","answer":"TN"},{"prompt":"Houston is the biggest city of which state?","answer":"TX"},{"prompt":"Salt Lake City is the biggest city of which state?","answer":"UT"},{"prompt":"Burlington is the biggest city of which state?","answer":"VT"},{"prompt":"Virginia Beach is the biggest city of which state?","answer":"VA"},{"prompt":"Seattle is the biggest city of which state?","answer":"WA"},{"prompt":"Charleston is the biggest city of which state?","answer":"WV"},{"prompt":"Milwaukee is the biggest city of which state?","answer":"WI"},{"prompt":"Cheyenne is the biggest city of which state?","answer":"WY"}];
    const NAMES = {"AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut","DE":"Delaware","FL":"Florida","GA":"Georgia","HI":"Hawaii","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Louisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"New Hampshire","NJ":"New Jersey","NM":"New Mexico","NY":"New York","NC":"North Carolina","ND":"North Dakota","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvania","RI":"Rhode Island","SC":"South Carolina","SD":"South Dakota","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington","WV":"West Virginia","WI":"Wisconsin","WY":"Wyoming"};
    const SHARE_PREFIX = "🏙️";
    const T_ = {"round":"Round","score":"Score","lives":"Lives","start":"Start","tryAgain":"Play again","share":"Share result","wellDone":"Well done!","gameOver":"Game over","easy":"Easy","normal":"Normal","hard":"Hard","submit":"Submit","skip":"Skip","categories":"Categories","solved":"Solved","mistakes":"Mistakes","pick4":"Pick 4 states that share a category","placeholder":"Type a state name…"};
    const TOTAL = 15;
    let queue=[],round=0,score=0,lives=3,answered=false;
    const $ = id => document.getElementById(id);

    function pickQueue(){return shuffle(ITEMS).slice(0,TOTAL);}

    function nextRound(){
      answered=false;
      if(round>=TOTAL||queue.length===0)return finish();
      round++;
      const it = queue.shift();
      $('g-round').textContent = round+'/'+TOTAL;
      $('g-prompt').innerHTML = it.prompt;
      // Build 4 choices: correct + 3 random distractors
      const correct = it.answer;
      let pool = it.distractors && it.distractors.length>0 ? it.distractors : Object.keys(NAMES).filter(k=>k!==correct);
      const distractors = shuffle(pool).slice(0,3);
      const choiceIds = shuffle([correct,...distractors]);
      const ch = $('g-choices'); ch.innerHTML='';
      choiceIds.forEach(id => {
        const b = document.createElement('button');
        b.className='ab-choice'; b.textContent=NAMES[id]||id; b.dataset.id=id;
        b.addEventListener('click',()=>answer(b,correct));
        ch.appendChild(b);
      });
      $('g-feedback').innerHTML='&nbsp;';
    }
    function answer(btn,correctId){
      if(answered)return;
      answered=true;
      const correctBtn = Array.from(document.querySelectorAll('.ab-choice')).find(b=>b.dataset.id===correctId);
      if(btn.dataset.id===correctId){
        score++; btn.classList.add('correct');
        $('g-feedback').textContent='✅ '+T_.wellDone;
        $('g-feedback').className='feedback ok';
      } else {
        btn.classList.add('wrong');
        if(correctBtn)correctBtn.classList.add('correct');
        lives--;
        $('g-feedback').textContent='❌ → '+(NAMES[correctId]||correctId);
        $('g-feedback').className='feedback no';
        $('g-lives').textContent='❤️'.repeat(lives)+'\u{1F90D}'.repeat(3-lives);
        if(lives<=0){setTimeout(finish,800);return;}
      }
      $('g-score').textContent=score;
      setTimeout(nextRound,800);
    }
    function finish(){renderResult($('g-result'),score,TOTAL,T_,"biggest-cities",SHARE_PREFIX);}
    $('g-start').addEventListener('click',()=>{
      queue=pickQueue(); round=0; score=0; lives=3;
      $('g-lives').textContent='❤️❤️❤️';
      $('g-score').textContent='0'; $('g-result').style.display='none'; $('g-start').style.display='none';
      nextRound();
    });
  })();
  </script>
