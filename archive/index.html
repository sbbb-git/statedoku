<body class="legal-body">

<header>
  <a href="/" class="logo">State<em>doku</em> <span class="logo-flag">🇺🇸</span></a>
  <nav class="nav-actions">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr" onclick="location.href='/fr/archive/'">FR</button>
      <button class="lang-btn" data-lang="es" onclick="location.href='/es/archive/'">ES</button>
    </div>
  </nav>
</header>

<main class="archive-main">
  <article class="archive-page">
    <h1>Archive</h1>
    <p class="archive-intro">Tap any past day to play its puzzle. Your progress per date is saved separately.</p>

    <div class="archive-legend">
      <span><span class="archive-dot archive-dot-solved"></span>Solved</span>
      <span><span class="archive-dot archive-dot-lost"></span>Game over</span>
      <span><span class="archive-dot archive-dot-progress"></span>In progress</span>
      <span><span class="archive-dot archive-dot-empty"></span>Not played</span>
    </div>

    <nav class="archive-nav">
      <button id="arc-prev" aria-label="Previous month">◀</button>
      <h2 id="arc-month-label" aria-live="polite"></h2>
      <button id="arc-next" aria-label="Next month">▶</button>
    </nav>

    <div class="archive-calendar" id="arc-calendar"></div>

    <p class="archive-meta" id="arc-stats"></p>
    <p class="legal-back"><a href="/">→ Back to today's puzzle</a></p>
  </article>
</main>
