<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<base href="/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constraints — Statedoku Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg?v=5">
<style>
  :root {
    --navy: #0F2147; --red: #DC2626; --gold: #F59E0B; --green: #059669;
    --bg: #FAFAF9; --surface: #FFFFFF; --surface-2: #F5F5F4;
    --border: #E5E5E5;
    --text: #0A0A0A; --text-2: #525252; --text-3: #A3A3A3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
    padding: 0; min-height: 100dvh;
  }

  /* Sticky top bar */
  .top {
    position: sticky; top: 0; z-index: 10;
    background: var(--navy); color: #fff;
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 0 rgba(0,0,0,0.1);
  }
  .top h1 { font-size: 1rem; font-weight: 800; letter-spacing: -.01em; }
  .top h1 small { font-weight: 600; opacity: 0.65; margin-left: 8px; }
  .top a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: .8rem; font-weight: 700; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.25); border-radius: 999px; }
  .top a:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* Stats strip */
  .strip {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border-bottom: 1px solid var(--border);
  }
  .strip > div { background: #fff; padding: 14px 18px; }
  .strip-v { font-size: 1.5rem; font-weight: 900; color: var(--navy); line-height: 1; }
  .strip-l { font-size: .65rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--text-3); margin-top: 4px; }

  /* Toolbar */
  .toolbar {
    padding: 14px 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: #fff; border-bottom: 1px solid var(--border);
    position: sticky; top: 52px; z-index: 9;
  }
  .toolbar input {
    flex: 1; min-width: 200px;
    padding: 9px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: #fff; font-size: .9rem; outline: none;
  }
  .toolbar input:focus { border-color: var(--navy); }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 13px; border-radius: 999px; border: 1px solid var(--border);
    background: #fff; font-size: .78rem; cursor: pointer;
    font-weight: 700; color: var(--text-2); white-space: nowrap;
  }
  .chip:hover { background: var(--surface-2); }
  .chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* Content */
  .content { padding: 0 0 80px; }

  .cat {
    border-bottom: 1px solid var(--border);
  }
  .cat-head {
    padding: 16px 20px 10px;
    background: var(--surface-2);
    font-size: .7rem; font-weight: 900; text-transform: uppercase; letter-spacing: .14em;
    color: var(--navy);
    display: flex; align-items: baseline; gap: 10px;
  }
  .cat-head .ct { color: var(--text-3); font-weight: 700; letter-spacing: .08em; }

  .row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 16px;
    padding: 12px 20px;
    background: #fff;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .row:hover { background: #FAFAF9; }
  .row.disabled { opacity: 0.42; background: var(--surface-2); }
  .row.warn { background: #FFFBEB; }
  .row.warn:hover { background: #FEF3C7; }

  .row-main { min-width: 0; }
  .row-title {
    font-weight: 700; font-size: .95rem; color: var(--text);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .row-id { font-family: ui-monospace, Menlo, monospace; font-size: .68rem; color: var(--text-3); font-weight: 600; }
  .row-states {
    margin-top: 6px;
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .row-states span {
    font-size: .68rem; font-weight: 700;
    background: #EEF2FB; color: var(--navy);
    padding: 2px 6px; border-radius: 4px;
    font-family: ui-monospace, Menlo, monospace;
  }
  .row-states.empty span { background: #FEE2E2; color: var(--red); }

  .row-badge {
    font-size: .7rem; font-weight: 800; padding: 4px 10px; border-radius: 999px;
    white-space: nowrap;
    background: #D1FAE5; color: #065F46;
  }
  .row-badge.low { background: #FEF3C7; color: #92400E; }
  .row-badge.bad { background: #FEE2E2; color: #991B1B; }

  .row-btn {
    font-size: .72rem; font-weight: 800;
    padding: 7px 12px; border-radius: 8px;
    background: #fff; border: 1px solid var(--border);
    color: var(--text-2); cursor: pointer;
    transition: all .15s;
  }
  .row[data-pending="0"] .row-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }
  .row.disabled[data-pending="0"] .row-btn {
    background: var(--green); color: #fff; border-color: var(--green);
  }
  .row.disabled[data-pending="0"] .row-btn::before { content: '✓ Re-enable'; }
  .row[data-pending="0"]:not(.disabled) .row-btn::before { content: '✕ Disable'; }

  /* Pending rows */
  .row.pending {
    background: #FFFBEB;
    border-left: 3px solid #F59E0B;
  }
  .row.pending:hover { background: #FEF3C7; }
  .row-actions { display: inline-flex; gap: 6px; }
  .btn-approve:hover { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-reject:hover  { background: var(--red);   color: #fff; border-color: var(--red); }

  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--text-3);
  }
  .loader {
    text-align: center; padding: 80px 24px; color: var(--text-3); font-size: .9rem;
  }
  .loader::before {
    content: ''; display: inline-block; width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err {
    margin: 20px; padding: 16px; background: #FEE2E2; color: #991B1B;
    border-radius: 8px; font-size: .85rem; font-family: ui-monospace, Menlo, monospace;
  }

  @media (max-width: 600px) {
    .strip { grid-template-columns: repeat(2, 1fr); }
    .strip-v { font-size: 1.25rem; }
    .row { grid-template-columns: 1fr auto; }
    .row-btn { grid-column: 2; grid-row: 1; }
    .row-badge { grid-column: 1 / -1; justify-self: start; }
    .toolbar { top: 50px; }
  }
</style>
</head>
<body>

<div class="top">
  <h1>Constraints catalog <small id="count-label"></small></h1>
  <a href="/admin/">← Admin</a>
</div>

<div class="strip" id="strip"></div>

<div class="toolbar">
  <input id="search" placeholder="Search by name, id, or state code (CA, TX, NY…)" autocomplete="off">
  <button class="chip active" data-filter="all">Active</button>
  <button class="chip" data-filter="pending">⏳ Pending review</button>
  <button class="chip" data-filter="low">⚠️ ≤5 states</button>
  <button class="chip" data-filter="disabled">Disabled</button>
</div>

<div class="content" id="content">
  <div class="loader">Loading constraints…</div>
</div>

<script src="/js/constraints-pending.js?v=3"></script>
<script>
(async function() {

  const ENGLISH_FALLBACK = {}; // populated from translations.json

  // ──────────────────────────────────────────────────────────────────
  // Fetch data with absolute paths (avoids /admin/constraints/ resolution bugs)
  // ──────────────────────────────────────────────────────────────────
  let states, translations;
  try {
    const [statesRes, transRes] = await Promise.all([
      fetch('/data/states.json'),
      fetch('/data/translations.json'),
    ]);
    if (!statesRes.ok) throw new Error('states.json HTTP ' + statesRes.status);
    if (!transRes.ok) throw new Error('translations.json HTTP ' + transRes.status);
    states = await statesRes.json();
    translations = await transRes.json();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="err">Failed to load data: ${e.message}</div>`;
    return;
  }

  // ──────────────────────────────────────────────────────────────────
  // Hard-coded constraint catalog (mirrors ALL_CONSTRAINTS in puzzle.js)
  // ──────────────────────────────────────────────────────────────────
  const ALL_CONSTRAINTS = [
    // Regions
    'region_west', 'region_south', 'region_midwest', 'region_northeast',
    // Subregions
    'sub_new_england', 'sub_mid_atlantic', 'sub_deep_south', 'sub_plains', 'sub_mountain',
    // Population
    'pop_lt1m', 'pop_1m5m', 'pop_5m10m', 'pop_gt10m',
    // Coastline / borders
    'coast_atlantic', 'coast_pacific', 'coast_gulf', 'coast_great_lakes',
    'landlocked', 'border_canada', 'border_mexico',
    // Belts
    'sun_belt', 'snow_belt', 'corn_belt', 'wheat_belt', 'cotton_belt',
    'bible_belt', 'rust_belt',
    // Politics
    'political_red', 'political_blue', 'political_swing',
    'trump_2024', 'biden_2020',
    // Timezones
    'tz_eastern', 'tz_central', 'tz_mountain', 'tz_pacific', 'multi_timezone',
    // History
    'original_13', 'confederate', 'statehood_pre_1800', 'statehood_1900s',
    // Geography
    'on_mississippi', 'mt_rockies', 'mt_appalachians',
    'desert_state', 'four_corners', 'great_plains', 'appalachian',
    'tornado_alley', 'hurricane_zone', 'earthquake_zone',
    'has_volcano', 'has_glaciers',
    'on_appalachian_trail', 'on_continental_divide', 'has_caves',
    'high_elevation', 'low_elevation', 'route_66',
    // Cities & capitals
    'has_million_city', 'largest_state', 'smallest_state',
    'capital_named_after_president', 'capital_starts_with_s',
    'borders_6_plus', 'borders_few',
    // Sports
    'has_nba', 'no_pro_team',
    // Name origin
    'name_native_origin', 'name_spanish_origin', 'name_royalty_origin',
    // Name properties
    'two_word_name', 'ends_in_vowel', 'double_letter',
    'vowel_start', 'consonant_start', 'has_new',
    'ends_in_a', 'ends_in_o', 'ends_in_e', 'ends_in_n', 'ends_in_s',
    'starts_and_ends_vowel', 'double_s', 'two_word_starts_n',
    'contains_letter_k', 'contains_letter_w', 'contains_letter_v', 'contains_letter_y',
    'short_name', 'long_name',
    // Letter count
    'letters_6', 'letters_7', 'letters_8', 'letters_9',
    // Starts with letter
    'starts_a', 'starts_i', 'starts_m', 'starts_n', 'starts_w',
  ];

  // ──────────────────────────────────────────────────────────────────
  // Matches function (mirrors puzzle.js)
  // ──────────────────────────────────────────────────────────────────
  function matches(state, c) {
    if (c.length === 8 && c.startsWith('starts_')) return state.startsWith === c[7].toUpperCase();
    if (c.startsWith('letters_'))                  return state.letterCount === parseInt(c.slice(8), 10);

    switch (c) {
      case 'region_west':      return state.region === 'west';
      case 'region_south':     return state.region === 'south';
      case 'region_midwest':   return state.region === 'midwest';
      case 'region_northeast': return state.region === 'northeast';
      case 'sub_new_england':  return state.subregion === 'new_england';
      case 'sub_mid_atlantic': return state.subregion === 'mid_atlantic';
      case 'sub_deep_south':   return state.subregion === 'deep_south';
      case 'sub_plains':       return state.subregion === 'plains';
      case 'sub_mountain':     return state.subregion === 'mountain';
      case 'pop_lt1m':   return state.population === '<1M';
      case 'pop_1m5m':   return state.population === '1M-5M';
      case 'pop_5m10m':  return state.population === '5M-10M';
      case 'pop_gt10m':  return state.population === '>10M';
      case 'coast_atlantic':   return state.coastline?.includes('atlantic');
      case 'coast_pacific':    return state.coastline?.includes('pacific');
      case 'coast_gulf':       return state.coastline?.includes('gulf');
      case 'coast_great_lakes':return state.coastline?.includes('great_lakes');
      case 'landlocked':       return !!state.landlocked;
      case 'border_canada':    return !!state.bordersCanada;
      case 'border_mexico':    return !!state.bordersMexico;
      case 'sun_belt':    return !!state.sunBelt;
      case 'snow_belt':   return !!state.snowBelt;
      case 'corn_belt':   return !!state.cornBelt;
      case 'wheat_belt':  return !!state.wheatBelt;
      case 'cotton_belt': return !!state.cottonBelt;
      case 'bible_belt':  return !!state.bibleBelt;
      case 'rust_belt':   return !!state.rustBelt;
      case 'political_red':    return state.political === 'red';
      case 'political_blue':   return state.political === 'blue';
      case 'political_swing':  return state.political === 'swing';
      case 'trump_2024':       return state.elections && state.elections['2024'] === 'r';
      case 'biden_2020':       return state.elections && state.elections['2020'] === 'd';
      case 'tz_eastern':  return state.timezone === 'eastern';
      case 'tz_central':  return state.timezone === 'central';
      case 'tz_mountain': return state.timezone === 'mountain';
      case 'tz_pacific':  return state.timezone === 'pacific';
      case 'multi_timezone': return !!state.multiTimezone;
      case 'original_13':       return !!state.original13;
      case 'confederate':       return !!state.confederate;
      case 'statehood_pre_1800':return !!state.statehoodPre1800;
      case 'statehood_1900s':   return !!state.statehood1900s;
      case 'on_mississippi': return !!state.onMississippi;
      case 'mt_rockies':     return state.mountainRange?.includes('rockies');
      case 'mt_appalachians':return state.mountainRange?.includes('appalachians');
      case 'desert_state':   return !!state.desertState;
      case 'four_corners':   return !!state.fourCorners;
      case 'great_plains':   return !!state.greatPlains;
      case 'appalachian':    return !!state.appalachian;
      case 'tornado_alley':  return !!state.tornadoAlley;
      case 'hurricane_zone': return !!state.hurricaneZone;
      case 'earthquake_zone':return !!state.earthquakeZone;
      case 'has_volcano':    return !!state.hasVolcano;
      case 'has_glaciers':   return !!state.hasGlaciers;
      case 'on_appalachian_trail':  return !!state.appalachianTrail;
      case 'on_continental_divide': return !!state.continentalDivide;
      case 'has_caves':      return !!state.hasCaves;
      case 'high_elevation': return !!state.highElevation;
      case 'low_elevation':  return !!state.lowElevation;
      case 'route_66':       return !!state.route66;
      case 'has_million_city':              return !!state.hasMillionCity;
      case 'largest_state':                 return state.areaRank <= 5;
      case 'smallest_state':                return state.areaRank >= 46;
      case 'capital_named_after_president': return !!state.capitalNamedAfterPresident;
      case 'capital_starts_with_s':         return !!state.capitalStartsWithS;
      case 'borders_6_plus': return !!state.borders6Plus;
      case 'borders_few':    return !!state.bordersFew;
      case 'has_nba':       return !!state.nbaTeam;
      case 'no_pro_team':   return !state.nbaTeam && !state.nflTeam && !state.mlbTeam && !state.nhlTeam;
      case 'name_native_origin':  return !!state.nameNative;
      case 'name_spanish_origin': return !!state.nameSpanish;
      case 'name_royalty_origin': return !!state.nameRoyalty;
      case 'two_word_name':       return state.wordCount === 2;
      case 'ends_in_vowel':       return !!state.endsInVowel;
      case 'double_letter':       return !!state.doubleLetter;
      case 'vowel_start':         return 'AEIOU'.includes(state.startsWith);
      case 'consonant_start':     return !'AEIOU'.includes(state.startsWith);
      case 'has_new':             return state.names?.en?.includes('New');
      case 'ends_in_a':           return state.endsWith === 'A';
      case 'ends_in_o':           return state.endsWith === 'O';
      case 'ends_in_e':           return state.endsWith === 'E';
      case 'ends_in_n':           return state.endsWith === 'N';
      case 'ends_in_s':           return state.endsWith === 'S';
      case 'starts_and_ends_vowel': return 'AEIOU'.includes(state.startsWith) && state.endsInVowel;
      case 'double_s':            return !!state.doubleS;
      case 'two_word_starts_n':   return state.wordCount === 2 && state.startsWith === 'N';
      case 'contains_letter_k':   return state.names?.en?.toUpperCase().includes('K');
      case 'contains_letter_w':   return state.names?.en?.toUpperCase().includes('W');
      case 'contains_letter_v':   return state.names?.en?.toUpperCase().includes('V');
      case 'contains_letter_y':   return state.names?.en?.toUpperCase().includes('Y');
      case 'short_name':          return state.letterCount <= 6;
      case 'long_name':           return state.letterCount >= 10;
      default:
        // Pending candidate predicates registered via window.PENDING_MAP
        if (window.PENDING_MAP && window.PENDING_MAP[c]) {
          try { return !!window.PENDING_MAP[c].match(state); } catch { return false; }
        }
        return false;
    }
  }

  // ──────────────────────────────────────────────────────────────────
  // Categories (labels for grouping)
  // ──────────────────────────────────────────────────────────────────
  const CATEGORIES = [
    { label: 'Regions',         match: id => id.startsWith('region_') },
    { label: 'Subregions',      match: id => id.startsWith('sub_') },
    { label: 'Population',      match: id => id.startsWith('pop_') },
    { label: 'Coasts & borders',match: id => id.startsWith('coast_') || id === 'landlocked' || id.startsWith('border_') || id.startsWith('borders_') },
    { label: 'Belts',           match: id => id.endsWith('_belt') || id === 'route_66' },
    { label: 'Politics',        match: id => id.startsWith('political_') || id === 'trump_2024' || id === 'biden_2020' },
    { label: 'Timezones',       match: id => id.startsWith('tz_') || id === 'multi_timezone' },
    { label: 'History',         match: id => id === 'original_13' || id === 'confederate' || id.startsWith('statehood_') },
    { label: 'Geography & nature', match: id => ['on_mississippi','mt_rockies','mt_appalachians','desert_state','four_corners','great_plains','appalachian','tornado_alley','hurricane_zone','earthquake_zone','has_volcano','has_glaciers','on_appalachian_trail','on_continental_divide','has_caves','high_elevation','low_elevation'].includes(id) },
    { label: 'Cities & capitals', match: id => ['has_million_city','largest_state','smallest_state','capital_named_after_president','capital_starts_with_s'].includes(id) },
    { label: 'Sports',          match: id => ['has_nba','no_pro_team'].includes(id) },
    { label: 'Name origin',     match: id => id.startsWith('name_') },
    { label: 'Name properties', match: id => ['two_word_name','ends_in_vowel','double_letter','vowel_start','consonant_start','has_new','starts_and_ends_vowel','double_s','two_word_starts_n','short_name','long_name'].includes(id) || id.startsWith('ends_in_') || id.startsWith('contains_letter_') },
    { label: 'Letter count',    match: id => id.startsWith('letters_') },
    { label: 'Starts with letter', match: id => id.startsWith('starts_') && id !== 'starts_and_ends_vowel' },
    { label: 'Other',           match: id => true },
  ];

  function categorize(id) {
    for (const c of CATEGORIES) if (c.match(id)) return c.label;
    return 'Other';
  }

  // ──────────────────────────────────────────────────────────────────
  // Disabled / approved-pending / rejected-pending sets (localStorage)
  // ──────────────────────────────────────────────────────────────────
  const DK = 'statedoku_disabled_constraints';
  const AK = 'statedoku_approved_pending';
  const RK = 'statedoku_rejected_pending';

  const getSet = (k) => {
    try { return new Set(JSON.parse(localStorage.getItem(k) || '[]')); } catch { return new Set(); }
  };
  const setSet = (k, set) => {
    localStorage.setItem(k, JSON.stringify([...set]));
    Object.keys(localStorage).filter(x => x.includes('_puzzle_')).forEach(x => localStorage.removeItem(x));
  };
  const getDisabled = () => getSet(DK);
  const setDisabled = (s) => setSet(DK, s);
  const getApproved = () => getSet(AK);
  const setApproved = (s) => setSet(AK, s);
  const getRejected = () => getSet(RK);
  const setRejected = (s) => setSet(RK, s);

  // ──────────────────────────────────────────────────────────────────
  // Pending candidates (from constraints-pending.js)
  // ──────────────────────────────────────────────────────────────────
  const PENDING = (window.PENDING_CONSTRAINTS || []);
  const PENDING_IDS = new Set(PENDING.map(c => c.id));

  // Prune old approved/rejected IDs that aren't in the current pending list
  // (e.g. after the candidate catalog is updated)
  (function _pruneStale() {
    const ap = getSet(AK), rj = getSet(RK);
    let changed = false;
    for (const id of [...ap]) if (!PENDING_IDS.has(id)) { ap.delete(id); changed = true; }
    for (const id of [...rj]) if (!PENDING_IDS.has(id)) { rj.delete(id); changed = true; }
    if (changed) { setApproved(ap); setRejected(rj); }
  })();

  // Auto-reject any pending candidate with ≤3 matching states.
  // Cheap pre-compute using the _states string field; idempotent.
  (function _autoRejectThin() {
    const rj = getSet(RK), ap = getSet(AK);
    let changed = false;
    for (const c of PENDING) {
      if (ap.has(c.id) || rj.has(c.id)) continue;
      const n = (c._states || '').trim().split(/\s+/).filter(Boolean).length;
      if (n <= 3) {
        rj.add(c.id);
        changed = true;
      }
    }
    if (changed) setRejected(rj);
  })();

  // ──────────────────────────────────────────────────────────────────
  // Compute matching states for both active + pending
  // ──────────────────────────────────────────────────────────────────
  const matchMap = {};
  for (const id of [...ALL_CONSTRAINTS, ...PENDING_IDS]) {
    matchMap[id] = states.filter(s => matches(s, id)).map(s => s.id);
  }

  const labelOf = (id) => {
    const en = translations?.en?.constraints?.[id];
    return en || id.replace(/_/g, ' ');
  };
  const labelFr = (id) => translations?.fr?.constraints?.[id] || '';

  // ──────────────────────────────────────────────────────────────────
  // Render
  // ──────────────────────────────────────────────────────────────────
  let filter = 'all', search = '';
  let disabled = getDisabled();
  let approved = getApproved();
  let rejected = getRejected();

  function badgeClass(n) {
    if (n <= 4) return 'bad';
    if (n <= 7) return 'low';
    return '';
  }

  function pendingUndecided() {
    return PENDING.filter(c => !approved.has(c.id) && !rejected.has(c.id));
  }

  function drawStrip() {
    const total = ALL_CONSTRAINTS.length;
    const enabled = total - disabled.size;
    const low = ALL_CONSTRAINTS.filter(id => matchMap[id].length <= 5).length;
    const pendCount = pendingUndecided().length;
    const apprCount = approved.size;
    document.getElementById('strip').innerHTML = `
      <div><div class="strip-v">${total + apprCount}</div><div class="strip-l">Active total</div></div>
      <div><div class="strip-v" style="color:#92400E">${pendCount}</div><div class="strip-l">Pending review</div></div>
      <div><div class="strip-v" style="color:#065F46">${apprCount}</div><div class="strip-l">Approved</div></div>
      <div><div class="strip-v" style="color:#991B1B">${disabled.size + rejected.size}</div><div class="strip-l">Disabled / rejected</div></div>
    `;
    document.getElementById('count-label').textContent = `· ${total} active · ${pendCount} pending`;
  }

  function rowHtml(id, opts = {}) {
    const sts = matchMap[id] || [];
    const n = sts.length;
    const isDis  = disabled.has(id);
    const isAppr = approved.has(id);
    const isRej  = rejected.has(id);
    const isPend = opts.pending === true;

    let lbl, fr;
    if (isPend || PENDING_IDS.has(id)) {
      const p = window.PENDING_MAP[id];
      lbl = p?.en || id;
      fr  = p?.fr || '';
    } else {
      lbl = labelOf(id);
      fr  = labelFr(id);
    }

    const states_html = sts.length
      ? sts.map(s => `<span>${s}</span>`).join('')
      : `<span>— none —</span>`;

    const classes = [
      'row',
      isDis  ? 'disabled' : '',
      n <= 5 ? 'warn' : '',
      isPend ? 'pending' : '',
    ].filter(Boolean).join(' ');

    let actions;
    if (isPend) {
      actions = `
        <button class="row-btn btn-approve" data-action="approve">${isAppr ? '✓ Approved' : '✓ Approve'}</button>
        <button class="row-btn btn-reject"  data-action="reject">${isRej ? '✗ Rejected' : '✗ Reject'}</button>
      `;
    } else {
      actions = `<button class="row-btn"></button>`;
    }

    return `
      <div class="${classes}" data-id="${id}" data-pending="${isPend ? 1 : 0}">
        <div class="row-main">
          <div class="row-title">${lbl}${fr && fr !== lbl ? ` <span style="color:var(--text-3);font-size:.78rem;font-weight:500">· ${fr}</span>` : ''} <span class="row-id">${id}</span></div>
          <div class="row-states ${n === 0 ? 'empty' : ''}">${states_html}</div>
        </div>
        <span class="row-badge ${badgeClass(n)}">${n} state${n === 1 ? '' : 's'}</span>
        <span class="row-actions">${actions}</span>
      </div>
    `;
  }

  function applyFilter(ids, opts = {}) {
    return ids.filter(id => {
      const isPend = opts.pending === true;
      const n = (matchMap[id] || []).length;
      if (filter === 'low'      && n > 5) return false;
      if (!isPend && filter === 'disabled' && !disabled.has(id))       return false;
      if (!search) return true;
      const q = search.toLowerCase();
      if (id.toLowerCase().includes(q)) return true;
      const p = isPend ? window.PENDING_MAP[id] : null;
      const lbl = p ? p.en : labelOf(id);
      const lf  = p ? p.fr : labelFr(id);
      if (lbl.toLowerCase().includes(q)) return true;
      if (lf && lf.toLowerCase().includes(q)) return true;
      if ((matchMap[id] || []).includes(search.toUpperCase())) return true;
      return false;
    });
  }

  function drawList() {
    let html = '';

    if (filter === 'pending') {
      // Show only undecided pending candidates
      const undecided = pendingUndecided().map(c => c.id);
      const ids = applyFilter(undecided, { pending: true });
      if (!ids.length) {
        document.getElementById('content').innerHTML = `<div class="empty-state">🎉 All ${PENDING.length} pending candidates have been reviewed.</div>`;
        return;
      }
      html += `<div class="cat">
        <div class="cat-head">⏳ Pending review <span class="ct">${ids.length}</span></div>
        ${ids.map(id => rowHtml(id, { pending: true })).join('')}
      </div>`;
    } else {
      // Active constraints view
      const ids = applyFilter(ALL_CONSTRAINTS);
      // Append approved pending into the listing too (now part of active pool)
      const apprList = [...approved].filter(id => PENDING_IDS.has(id));
      if (!ids.length && !apprList.length) {
        document.getElementById('content').innerHTML = `<div class="empty-state">No constraint matches that filter.</div>`;
        return;
      }
      const grouped = {};
      for (const id of ids) {
        const cat = categorize(id);
        (grouped[cat] = grouped[cat] || []).push(id);
      }
      const order = CATEGORIES.map(c => c.label);
      for (const cat of order) {
        const arr = grouped[cat]; if (!arr || !arr.length) continue;
        html += `<div class="cat">
          <div class="cat-head">${cat} <span class="ct">${arr.length}</span></div>
          ${arr.map(id => rowHtml(id)).join('')}
        </div>`;
      }
      if (apprList.length) {
        html += `<div class="cat">
          <div class="cat-head">✓ Approved from pending <span class="ct">${apprList.length}</span></div>
          ${apprList.map(id => rowHtml(id, { pending: true })).join('')}
        </div>`;
      }
    }

    document.getElementById('content').innerHTML = html;

    // Wire active-row disable toggle
    document.querySelectorAll('.row[data-pending="0"] .row-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.closest('.row').dataset.id;
        if (disabled.has(id)) disabled.delete(id); else disabled.add(id);
        setDisabled(disabled);
        drawStrip();
        btn.closest('.row').classList.toggle('disabled', disabled.has(id));
      });
    });

    // Wire pending Approve / Reject
    document.querySelectorAll('.row[data-pending="1"] .row-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.closest('.row').dataset.id;
        const action = btn.dataset.action;
        if (action === 'approve') {
          approved.add(id); rejected.delete(id);
          setApproved(approved); setRejected(rejected);
        } else if (action === 'reject') {
          rejected.add(id); approved.delete(id);
          setApproved(approved); setRejected(rejected);
        }
        drawStrip();
        drawList();
      });
    });
  }

  // Toolbar wiring
  document.getElementById('search').addEventListener('input', e => {
    search = e.target.value.trim();
    drawList();
  });
  document.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      filter = c.dataset.filter;
      drawList();
    });
  });

  drawStrip();
  drawList();
})();
</script>

</body>
</html>
