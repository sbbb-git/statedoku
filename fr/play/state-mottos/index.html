  <script>
  (function(){
    
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function stars(s,t){const p=s/t;return p>=0.9?3:p>=0.6?2:p>=0.3?1:0;}
function persistResult(slug,score,total,st){try{const k='sds_play_'+slug;const today=new Date().toISOString().slice(0,10);const prev=JSON.parse(localStorage.getItem(k)||'{}');const y=new Date(Date.now()-86400000).toISOString().slice(0,10);const streak=(prev.lastPlayed===today)?(prev.streak||0):(prev.lastPlayed===y)?((prev.streak||0)+1):1;localStorage.setItem(k,JSON.stringify({lastPlayed:today,streak:streak,best:Math.max(prev.best||0,score)}));if(window.gtag)window.gtag('event','play_complete',{game:slug,score:score,total:total,stars:st});}catch(e){}}
async function shareResult(txt){try{if(navigator.share){await navigator.share({text:txt});return;}}catch(e){}try{await navigator.clipboard.writeText(txt);alert("Copié");}catch(e){alert(txt);}}
function renderResult(rootEl,score,total,T_,slug,sharePrefix){const st=stars(score,total);const filled='★'.repeat(st);const off='☆'.repeat(3-st);rootEl.style.display='block';rootEl.innerHTML='<h2>'+(score>=total*.3?T_.wellDone:T_.gameOver)+'</h2>'+'<div style="font-size:1.05rem;margin-bottom:6px"><strong>'+score+'/'+total+'</strong> ('+Math.round(score/total*100)+'%)</div>'+'<div class="stars"><span>'+filled+'</span><span class="off">'+off+'</span></div>'+'<div style="margin-top:10px"><button class="gbtn gold" onclick="window.location.reload()">'+T_.tryAgain+'</button> <button class="gbtn" id="_share">'+T_.share+'</button></div>';document.getElementById('_share').addEventListener('click',()=>shareResult(sharePrefix+' '+score+'/'+total+' '+('⭐'.repeat(st)+'⬜'.repeat(3-st))+' statedoku.com'+window.location.pathname));persistResult(slug,score,total,st);}

    const ITEMS = [{"prompt":"Audemus jura nostra defendere","answer":"AL"},{"prompt":"North to the Future","answer":"AK"},{"prompt":"Ditat Deus","answer":"AZ"},{"prompt":"Regnat populus","answer":"AR"},{"prompt":"Eureka","answer":"CA"},{"prompt":"Nil sine numine","answer":"CO"},{"prompt":"Qui transtulit sustinet","answer":"CT"},{"prompt":"Liberty and Independence","answer":"DE"},{"prompt":"In God We Trust","answer":"FL"},{"prompt":"Wisdom, Justice, Moderation","answer":"GA"},{"prompt":"Ua mau ke ea o ka aina i ka pono","answer":"HI"},{"prompt":"Esto perpetua","answer":"ID"},{"prompt":"State sovereignty, national union","answer":"IL"},{"prompt":"Crossroads of America","answer":"IN"},{"prompt":"Our liberties we prize and our rights we will maintain","answer":"IA"},{"prompt":"Ad astra per aspera","answer":"KS"},{"prompt":"United we stand, divided we fall","answer":"KY"},{"prompt":"Union, justice, confidence","answer":"LA"},{"prompt":"Dirigo","answer":"ME"},{"prompt":"Fatti maschii, parole femine","answer":"MD"},{"prompt":"Ense petit placidam sub libertate quietem","answer":"MA"},{"prompt":"Si quaeris peninsulam amoenam circumspice","answer":"MI"},{"prompt":"L'étoile du nord","answer":"MN"},{"prompt":"Virtute et armis","answer":"MS"},{"prompt":"Salus populi suprema lex esto","answer":"MO"},{"prompt":"Oro y plata","answer":"MT"},{"prompt":"Equality before the law","answer":"NE"},{"prompt":"All for our country","answer":"NV"},{"prompt":"Live free or die","answer":"NH"},{"prompt":"Liberty and prosperity","answer":"NJ"},{"prompt":"Crescit eundo","answer":"NM"},{"prompt":"Excelsior","answer":"NY"},{"prompt":"Esse quam videri","answer":"NC"},{"prompt":"Liberty and union, now and forever, one and inseparable","answer":"ND"},{"prompt":"With God, all things are possible","answer":"OH"},{"prompt":"Labor omnia vincit","answer":"OK"},{"prompt":"Alis volat propriis","answer":"OR"},{"prompt":"Virtue, liberty and independence","answer":"PA"},{"prompt":"Hope","answer":"RI"},{"prompt":"Dum spiro spero","answer":"SC"},{"prompt":"Under God the people rule","answer":"SD"},{"prompt":"Agriculture and commerce","answer":"TN"},{"prompt":"Friendship","answer":"TX"},{"prompt":"Industry","answer":"UT"},{"prompt":"Freedom and unity","answer":"VT"},{"prompt":"Sic semper tyrannis","answer":"VA"},{"prompt":"Alki","answer":"WA"},{"prompt":"Montani semper liberi","answer":"WV"},{"prompt":"Forward","answer":"WI"},{"prompt":"Equal rights","answer":"WY"}];
    const NAMES = {"AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"Californie","CO":"Colorado","CT":"Connecticut","DE":"Delaware","FL":"Floride","GA":"Géorgie","HI":"Hawaï","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Louisiane","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Mississippi","MO":"Missouri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"Nouveau-Hampshire","NJ":"New Jersey","NM":"Nouveau-Mexique","NY":"New York","NC":"Caroline du Nord","ND":"Dakota du Nord","OH":"Ohio","OK":"Oklahoma","OR":"Oregon","PA":"Pennsylvanie","RI":"Rhode Island","SC":"Caroline du Sud","SD":"Dakota du Sud","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginie","WA":"Washington","WV":"Virginie-Occidentale","WI":"Wisconsin","WY":"Wyoming"};
    const SHARE_PREFIX = "📜";
    const T_ = {"round":"Manche","score":"Score","lives":"Vies","start":"Commencer","tryAgain":"Rejouer","share":"Partager","wellDone":"Bravo !","gameOver":"Terminé","easy":"Facile","normal":"Normal","hard":"Difficile","submit":"Valider","skip":"Passer","categories":"Catégories","solved":"Résolu","mistakes":"Erreurs","pick4":"Choisis 4 États qui partagent une catégorie","placeholder":"Tape un nom d’État…"};
    const TOTAL = 15;
    let queue=[],round=0,score=0,lives=3,answered=false;
    const $ = id => document.getElementById(id);

    function pickQueue(){return shuffle(ITEMS).slice(0,TOTAL);}

    function nextRound(){
      answered=false;
      if(round>=TOTAL||queue.length===0)return finish();
      round++;
      const it = queue.shift();
      $('g-round').textContent = round+'/'+TOTAL;
      $('g-prompt').innerHTML = it.prompt;
      // Build 4 choices: correct + 3 random distractors
      const correct = it.answer;
      let pool = it.distractors && it.distractors.length>0 ? it.distractors : Object.keys(NAMES).filter(k=>k!==correct);
      const distractors = shuffle(pool).slice(0,3);
      const choiceIds = shuffle([correct,...distractors]);
      const ch = $('g-choices'); ch.innerHTML='';
      choiceIds.forEach(id => {
        const b = document.createElement('button');
        b.className='ab-choice'; b.textContent=NAMES[id]||id; b.dataset.id=id;
        b.addEventListener('click',()=>answer(b,correct));
        ch.appendChild(b);
      });
      $('g-feedback').innerHTML='&nbsp;';
    }
    function answer(btn,correctId){
      if(answered)return;
      answered=true;
      const correctBtn = Array.from(document.querySelectorAll('.ab-choice')).find(b=>b.dataset.id===correctId);
      if(btn.dataset.id===correctId){
        score++; btn.classList.add('correct');
        $('g-feedback').textContent='✅ '+T_.wellDone;
        $('g-feedback').className='feedback ok';
      } else {
        btn.classList.add('wrong');
        if(correctBtn)correctBtn.classList.add('correct');
        lives--;
        $('g-feedback').textContent='❌ → '+(NAMES[correctId]||correctId);
        $('g-feedback').className='feedback no';
        $('g-lives').textContent='❤️'.repeat(lives)+'\u{1F90D}'.repeat(3-lives);
        if(lives<=0){setTimeout(finish,800);return;}
      }
      $('g-score').textContent=score;
      setTimeout(nextRound,800);
    }
    function finish(){renderResult($('g-result'),score,TOTAL,T_,"state-mottos",SHARE_PREFIX);}
    $('g-start').addEventListener('click',()=>{
      queue=pickQueue(); round=0; score=0; lives=3;
      $('g-lives').textContent='❤️❤️❤️';
      $('g-score').textContent='0'; $('g-result').style.display='none'; $('g-start').style.display='none';
      nextRound();
    });
  })();
  </script>
