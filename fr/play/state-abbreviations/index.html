<script>
(function(){
  const STATES = [{"id":"AL","name":"Alabama"},{"id":"AK","name":"Alaska"},{"id":"AZ","name":"Arizona"},{"id":"AR","name":"Arkansas"},{"id":"CA","name":"Californie"},{"id":"CO","name":"Colorado"},{"id":"CT","name":"Connecticut"},{"id":"DE","name":"Delaware"},{"id":"FL","name":"Floride"},{"id":"GA","name":"Géorgie"},{"id":"HI","name":"Hawaï"},{"id":"ID","name":"Idaho"},{"id":"IL","name":"Illinois"},{"id":"IN","name":"Indiana"},{"id":"IA","name":"Iowa"},{"id":"KS","name":"Kansas"},{"id":"KY","name":"Kentucky"},{"id":"LA","name":"Louisiane"},{"id":"ME","name":"Maine"},{"id":"MD","name":"Maryland"},{"id":"MA","name":"Massachusetts"},{"id":"MI","name":"Michigan"},{"id":"MN","name":"Minnesota"},{"id":"MS","name":"Mississippi"},{"id":"MO","name":"Missouri"},{"id":"MT","name":"Montana"},{"id":"NE","name":"Nebraska"},{"id":"NV","name":"Nevada"},{"id":"NH","name":"Nouveau-Hampshire"},{"id":"NJ","name":"New Jersey"},{"id":"NM","name":"Nouveau-Mexique"},{"id":"NY","name":"New York"},{"id":"NC","name":"Caroline du Nord"},{"id":"ND","name":"Dakota du Nord"},{"id":"OH","name":"Ohio"},{"id":"OK","name":"Oklahoma"},{"id":"OR","name":"Oregon"},{"id":"PA","name":"Pennsylvanie"},{"id":"RI","name":"Rhode Island"},{"id":"SC","name":"Caroline du Sud"},{"id":"SD","name":"Dakota du Sud"},{"id":"TN","name":"Tennessee"},{"id":"TX","name":"Texas"},{"id":"UT","name":"Utah"},{"id":"VT","name":"Vermont"},{"id":"VA","name":"Virginie"},{"id":"WA","name":"Washington"},{"id":"WV","name":"Virginie-Occidentale"},{"id":"WI","name":"Wisconsin"},{"id":"WY","name":"Wyoming"}];
  const T = {"round":"Manche","score":"Score","lives":"Vies","whichState":"Quel État a cette abréviation ?","wellDone":"Bravo !","gameOver":"Terminé","tryAgain":"Rejouer","share":"Partager","backToHub":"← Tous les jeux","start":"Commencer"};
  let queue = [];
  let round = 0;
  let total = 20;
  let score = 0;
  let lives = 3;
  let answered = false;
  const $ = id => document.getElementById(id);

  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function pickQueue(){ return shuffle(STATES.map(s=>s.id)).slice(0, total); }
  function nextRound(){
    answered=false;
    if (round >= total || queue.length === 0) return finish();
    round++;
    const id = queue.shift();
    const correct = STATES.find(s=>s.id===id);
    const distractors = shuffle(STATES.filter(s=>s.id!==id)).slice(0,3);
    const choices = shuffle([correct, ...distractors]);
    $('ab-round').textContent = round+'/'+total;
    $('ab-code').textContent = id;
    const ch = $('ab-choices');
    ch.innerHTML = '';
    choices.forEach(s => {
      const b = document.createElement('button');
      b.className = 'ab-choice';
      b.textContent = s.name;
      b.dataset.id = s.id;
      b.addEventListener('click', () => answer(b, correct.id));
      ch.appendChild(b);
    });
    $('ab-feedback').innerHTML = '&nbsp;';
  }
  function answer(btn, correctId){
    if (answered) return;
    answered = true;
    const correctBtn = Array.from(document.querySelectorAll('.ab-choice')).find(b => b.dataset.id === correctId);
    if (btn.dataset.id === correctId) {
      score++;
      btn.classList.add('correct');
      $('ab-feedback').textContent = '✅ ' + T.wellDone;
      $('ab-feedback').className = 'ab-feedback ok';
    } else {
      btn.classList.add('wrong');
      if (correctBtn) correctBtn.classList.add('correct');
      lives--;
      $('ab-feedback').textContent = '❌';
      $('ab-feedback').className = 'ab-feedback no';
      $('ab-lives').textContent = '❤️'.repeat(lives)+'🤍'.repeat(3-lives);
      if (lives <= 0) { setTimeout(finish, 800); return; }
    }
    $('ab-score').textContent = score;
    setTimeout(nextRound, 800);
  }
  function stars(s,t){const p=s/t;return p>=0.9?3:p>=0.6?2:p>=0.3?1:0;}
  function shareText(){const st=stars(score,total);return '✉️ Quiz Abréviations USPS ' + score + '/' + total + ' ' + '⭐'.repeat(st)+'⬜'.repeat(3-st) + ' statedoku.com/fr/play/state-abbreviations/';}
  function finish(){
    $('ab-result').style.display = 'block';
    const st = stars(score, total);
    $('ab-result').innerHTML = '<h2>' + (lives > 0 ? T.wellDone : T.gameOver) + '</h2>' +
      '<div style="font-size:1.05rem;margin-bottom:6px"><strong>' + score + '/' + total + '</strong> (' + Math.round(score/total*100) + '%)</div>' +
      '<div class="stars"><span style="color:#F59E0B;font-size:1.4rem;letter-spacing:6px">' + '★'.repeat(st) + '</span><span style="color:#E5E7EB;font-size:1.4rem;letter-spacing:6px">' + '☆'.repeat(3-st) + '</span></div>' +
      '<div style="margin-top:10px"><button class="ab-btn gold" onclick="window.location.reload()">' + T.tryAgain + '</button> ' +
      '<button class="ab-btn" id="ab-share-btn">' + T.share + '</button></div>';
    document.getElementById('ab-share-btn').addEventListener('click', async () => {
      const txt = shareText();
      try { if (navigator.share) { await navigator.share({ text: txt }); return; } } catch(e){}
      try { await navigator.clipboard.writeText(txt); alert('Copied'); } catch(e){ alert(txt); }
    });
    try {
      const key = 'sds_play_state-abbreviations';
      const today = new Date().toISOString().slice(0,10);
      const prev = JSON.parse(localStorage.getItem(key) || '{}');
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
      const streak = (prev.lastPlayed === today) ? (prev.streak||0) :
                     (prev.lastPlayed === yesterday) ? (prev.streak||0) + 1 : 1;
      localStorage.setItem(key, JSON.stringify({
        lastPlayed: today, streak: streak, best: Math.max(prev.best || 0, score),
      }));
      if (window.gtag) window.gtag('event','play_complete',{game:'state-abbreviations',score:score,total:total,stars:st});
    } catch(e){}
  }
  $('ab-start').addEventListener('click', () => {
    queue = pickQueue();
    round = 0;
    score = 0;
    lives = 3;
    $('ab-lives').textContent = '❤️❤️❤️';
    $('ab-score').textContent = '0';
    $('ab-result').style.display = 'none';
    $('ab-start').style.display = 'none';
    nextRound();
  });
})();
</script>
