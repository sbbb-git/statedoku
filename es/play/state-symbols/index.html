    const NAMES = {"AL":"Alabama","AK":"Alaska","AZ":"Arizona","AR":"Arkansas","CA":"California","CO":"Colorado","CT":"Connecticut","DE":"Delaware","FL":"Florida","GA":"Georgia","HI":"Hawái","ID":"Idaho","IL":"Illinois","IN":"Indiana","IA":"Iowa","KS":"Kansas","KY":"Kentucky","LA":"Luisiana","ME":"Maine","MD":"Maryland","MA":"Massachusetts","MI":"Michigan","MN":"Minnesota","MS":"Misisipi","MO":"Misuri","MT":"Montana","NE":"Nebraska","NV":"Nevada","NH":"Nuevo Hampshire","NJ":"Nueva Jersey","NM":"Nuevo México","NY":"Nueva York","NC":"Carolina del Norte","ND":"Dakota del Norte","OH":"Ohio","OK":"Oklahoma","OR":"Oregón","PA":"Pensilvania","RI":"Rhode Island","SC":"Carolina del Sur","SD":"Dakota del Sur","TN":"Tennessee","TX":"Texas","UT":"Utah","VT":"Vermont","VA":"Virginia","WA":"Washington","WV":"Virginia Occidental","WI":"Wisconsin","WY":"Wyoming"};
    const SHARE_PREFIX = "🌼";
    const T_ = {"round":"Ronda","score":"Puntuación","lives":"Vidas","start":"Empezar","tryAgain":"Volver a jugar","share":"Compartir","wellDone":"¡Bien!","gameOver":"Juego terminado","easy":"Fácil","normal":"Normal","hard":"Difícil","submit":"Enviar","skip":"Pasar","categories":"Categorías","solved":"Resuelto","mistakes":"Errores","pick4":"Elige 4 estados que compartan una categoría","placeholder":"Escribe un nombre de estado…"};
    const TOTAL = 15;
    let queue=[],round=0,score=0,lives=3,answered=false;
    const $ = id => document.getElementById(id);

    function pickQueue(){return shuffle(ITEMS).slice(0,TOTAL);}

    function nextRound(){
      answered=false;
      if(round>=TOTAL||queue.length===0)return finish();
      round++;
      const it = queue.shift();
      $('g-round').textContent = round+'/'+TOTAL;
      $('g-prompt').innerHTML = it.prompt;
      // Build 4 choices: correct + 3 random distractors
      const correct = it.answer;
      let pool = it.distractors && it.distractors.length>0 ? it.distractors : Object.keys(NAMES).filter(k=>k!==correct);
      const distractors = shuffle(pool).slice(0,3);
      const choiceIds = shuffle([correct,...distractors]);
      const ch = $('g-choices'); ch.innerHTML='';
      choiceIds.forEach(id => {
        const b = document.createElement('button');
        b.className='ab-choice'; b.textContent=NAMES[id]||id; b.dataset.id=id;
        b.addEventListener('click',()=>answer(b,correct));
        ch.appendChild(b);
      });
      $('g-feedback').innerHTML='&nbsp;';
    }
    function answer(btn,correctId){
      if(answered)return;
      answered=true;
      const correctBtn = Array.from(document.querySelectorAll('.ab-choice')).find(b=>b.dataset.id===correctId);
      if(btn.dataset.id===correctId){
        score++; btn.classList.add('correct');
        $('g-feedback').textContent='✅ '+T_.wellDone;
        $('g-feedback').className='feedback ok';
      } else {
        btn.classList.add('wrong');
        if(correctBtn)correctBtn.classList.add('correct');
        lives--;
        $('g-feedback').textContent='❌ → '+(NAMES[correctId]||correctId);
        $('g-feedback').className='feedback no';
        $('g-lives').textContent='❤️'.repeat(lives)+'\u{1F90D}'.repeat(3-lives);
        if(lives<=0){setTimeout(finish,800);return;}
      }
      $('g-score').textContent=score;
      setTimeout(nextRound,800);
    }
    function finish(){renderResult($('g-result'),score,TOTAL,T_,"state-symbols",SHARE_PREFIX);}
    $('g-start').addEventListener('click',()=>{
      queue=pickQueue(); round=0; score=0; lives=3;
      $('g-lives').textContent='❤️❤️❤️';
      $('g-score').textContent='0'; $('g-result').style.display='none'; $('g-start').style.display='none';
      nextRound();
    });
  })();
  </script>
