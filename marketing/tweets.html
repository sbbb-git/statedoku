</div>

// ── Render ──
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const stats = document.getElementById('stats');
let activeCat = 'all';

function render() {
  const q = search.value.trim().toLowerCase();
  const visible = TWEETS.filter(t => {
    if (activeCat !== 'all' && t.cat !== activeCat) return false;
    if (q && !t.text.toLowerCase().includes(q)) return false;
    return true;
  });
  stats.textContent = `${visible.length} of ${TWEETS.length} tweets`;
  grid.innerHTML = '';
  visible.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const charCount = t.text.length;
    const chClass = charCount > 280 ? 'error' : charCount > 240 ? 'warn' : '';
    card.innerHTML = `
      <div class="card-head">
        <span class="badge b-${t.cat}">${t.cat}</span>
        <span class="chars ${chClass}">${charCount} chars</span>
        <span class="nb">#${TWEETS.indexOf(t) + 1}</span>
      </div>
      <div class="tweet">${escapeHtml(t.text)}</div>
      <div class="actions">
        <button class="btn btn-copy" type="button">📋 Copy</button>
        <a class="btn btn-tweet" target="_blank" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(t.text)}">🐦 Tweet now</a>
      </div>
    `;
    const copyBtn = card.querySelector('.btn-copy');
    copyBtn.addEventListener('click', async () => {
      await navigator.clipboard.writeText(t.text);
      card.classList.add('copied');
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => { card.classList.remove('copied'); copyBtn.textContent = '📋 Copy'; }, 1500);
    });
    grid.appendChild(card);
  });
}
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

search.addEventListener('input', render);
document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => {
  activeCat = b.dataset.cat;
  document.querySelectorAll('.filter-btn').forEach(x => x.classList.toggle('active', x === b));
  render();
}));
render();
</script>

</body>
</html>
