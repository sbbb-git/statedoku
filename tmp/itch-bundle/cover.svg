<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 500" width="630" height="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F2147"/>
      <stop offset="1" stop-color="#0A1733"/>
    </linearGradient>
    <linearGradient id="goldCell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="630" height="500" fill="url(#bg)"/>

  <!-- Decorative stars (subtle) -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="60"  cy="50"  r="2"/>
    <circle cx="120" cy="90"  r="1.5"/>
    <circle cx="560" cy="60"  r="2"/>
    <circle cx="500" cy="110" r="1.5"/>
    <circle cx="80"  cy="430" r="2"/>
    <circle cx="540" cy="450" r="1.5"/>
    <circle cx="600" cy="380" r="2"/>
  </g>

  <!-- Top chip: "DAILY · FREE" -->
  <g transform="translate(315, 56)">
    <rect x="-78" y="-15" width="156" height="30" rx="15" fill="#F59E0B"/>
    <text text-anchor="middle" y="6" font-size="13" font-weight="900" fill="#0F2147" letter-spacing="3">DAILY · FREE</text>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle">
    <text x="315" y="160" font-size="78" font-weight="900" fill="#FFFFFF" letter-spacing="-2.5">State<tspan fill="#DC2626">doku</tspan></text>
    <text x="315" y="200" font-size="20" font-weight="700" fill="rgba(255,255,255,0.78)" letter-spacing="1.5">DAILY US STATES PUZZLE</text>
  </g>

  <!-- 3x3 grid visualization centered below -->
  <g transform="translate(195, 235)" filter="url(#softShadow)">
    <rect width="240" height="180" rx="14" fill="#1B3060"/>

    <!-- Row headers (column labels at top) -->
    <g font-size="9" font-weight="800" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="0.6">
      <text x="60"  y="20">PACIFIC</text>
      <text x="120" y="20">MEXICO</text>
      <text x="180" y="20">&gt; 5M POP</text>
    </g>

    <!-- 3x3 cells -->
    <g font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle">
      <!-- Row 1 -->
      <rect x="30"  y="32" width="60" height="44" rx="6" fill="url(#goldCell)"/>
      <text x="60"  y="59" fill="#0F2147">CA</text>

      <rect x="92"  y="32" width="60" height="44" rx="6" fill="#293F70"/>
      <text x="122" y="59">TX</text>

      <rect x="154" y="32" width="60" height="44" rx="6" fill="#293F70"/>
      <text x="184" y="59">FL</text>

      <!-- Row 2 -->
      <rect x="30"  y="80" width="60" height="44" rx="6" fill="#293F70"/>
      <text x="60"  y="107">OR</text>

      <rect x="92"  y="80" width="60" height="44" rx="6" fill="url(#goldCell)"/>
      <text x="122" y="107" fill="#0F2147">AZ</text>

      <rect x="154" y="80" width="60" height="44" rx="6" fill="#293F70"/>
      <text x="184" y="107">NY</text>

      <!-- Row 3 -->
      <rect x="30"  y="128" width="60" height="44" rx="6" fill="#293F70"/>
      <text x="60"  y="155">WA</text>

      <rect x="92"  y="128" width="60" height="44" rx="6" fill="#293F70"/>
      <text x="122" y="155">NM</text>

      <rect x="154" y="128" width="60" height="44" rx="6" fill="url(#goldCell)"/>
      <text x="184" y="155" fill="#0F2147">PA</text>
    </g>
  </g>

  <!-- Bottom strip: domain -->
  <g text-anchor="middle">
    <text x="315" y="460" font-size="15" font-weight="800" fill="rgba(255,255,255,0.55)" letter-spacing="2">STATEDOKU.COM</text>
  </g>

  <!-- Top-left stylized US flag -->
  <g transform="translate(36, 24)">
    <rect width="34" height="22" rx="2" fill="#FFFFFF"/>
    <rect width="34" height="3.14" y="3.14" fill="#DC2626"/>
    <rect width="34" height="3.14" y="9.43" fill="#DC2626"/>
    <rect width="34" height="3.14" y="15.71" fill="#DC2626"/>
    <rect width="34" height="3.14" y="18.86" fill="#DC2626"/>
    <rect width="14" height="11.4" fill="#0F2147"/>
    <g fill="#FFFFFF">
      <circle cx="2.5" cy="2.5" r="0.7"/><circle cx="5.5" cy="2.5" r="0.7"/><circle cx="8.5" cy="2.5" r="0.7"/><circle cx="11.5" cy="2.5" r="0.7"/>
      <circle cx="4"   cy="5"   r="0.7"/><circle cx="7"   cy="5"   r="0.7"/><circle cx="10"  cy="5"   r="0.7"/>
      <circle cx="2.5" cy="7.5" r="0.7"/><circle cx="5.5" cy="7.5" r="0.7"/><circle cx="8.5" cy="7.5" r="0.7"/><circle cx="11.5" cy="7.5" r="0.7"/>
    </g>
  </g>
  <!-- Top-right star -->
  <g transform="translate(575, 35)" fill="#F59E0B">
    <polygon points="0,-12 3.5,-3.7 12,-3.7 5.3,2 7.5,11 0,5.7 -7.5,11 -5.3,2 -12,-3.7 -3.5,-3.7"/>
  </g>
</svg>
